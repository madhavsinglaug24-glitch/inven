name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Ensure the correct Node.js version

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy built frontend to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/home/${{ secrets.VM_USERNAME }}/inven/frontend/dist"

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.VM_USERNAME }}/inven
            git reset --hard origin/main
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            cd frontend && npm install && npm run build && cd ..
            sudo -n systemctl restart sde_backend
